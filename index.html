<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Innebandytaktik — Tränarverktyg</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap');
:root{
  --bg:#0f172a;--surface:#1e293b;--surface2:#273548;--border:#334155;
  --text:#f1f5f9;--text2:#94a3b8;--accent:#E3000F;--accent2:#ff4d57;
  --radius:8px;--font:'DM Sans',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;flex-direction:column}
#header{display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.logo{width:28px;height:28px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:white;flex-shrink:0}
#header h1{font-size:15px;font-weight:600}
#header h1 span{font-weight:400;color:var(--text2);font-size:13px;margin-left:4px}
#db-status{display:flex;align-items:center;gap:5px;margin-left:auto;font-size:11px;color:var(--text2)}
.dbdot{width:7px;height:7px;border-radius:50%;background:#eab308;flex-shrink:0;transition:background 0.3s}
.dbdot.ok{background:#22c55e}.dbdot.err{background:#ef4444}
#main{display:flex;flex-direction:column;gap:0;flex:1;padding:8px 12px 12px;max-width:860px;margin:0 auto;width:100%}
.row{display:flex;gap:5px;flex-wrap:wrap;align-items:center;padding:5px 0}
.rl{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:0.07em;margin-right:2px;white-space:nowrap;flex-shrink:0}
button{padding:5px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:12px;font-family:var(--font);cursor:pointer;transition:background 0.1s,border-color 0.1s;white-space:nowrap;user-select:none}
button:hover{background:var(--surface2);border-color:#4a5568}
button.active{background:var(--surface2);border-color:#64748b;font-weight:600}
button:disabled{opacity:0.35;cursor:default}
button.primary{background:var(--accent);border-color:var(--accent);color:white;font-weight:600}
button.primary:hover{background:var(--accent2);border-color:var(--accent2)}
button.ai{background:#4f46e5;border-color:#4f46e5;color:white;font-weight:600}
button.ai:hover{background:#6366f1;border-color:#6366f1}
.sep{width:1px;height:20px;background:var(--border);margin:0 2px;flex-shrink:0}
.csep{display:inline-block;width:1px;height:14px;background:var(--border);margin:0 3px;vertical-align:middle}
.cdot{width:17px;height:17px;border-radius:50%;border:2.5px solid transparent;cursor:pointer;display:inline-block;vertical-align:middle;flex-shrink:0;transition:transform 0.1s}
.cdot:hover{transform:scale(1.15)}.cdot.active{border-color:white}
#stepbar{display:none;align-items:center;gap:8px;padding:7px 12px;background:var(--surface2);border-radius:var(--radius);border:1px solid var(--border);font-size:12px;margin-bottom:2px}
.step-pills{display:flex;gap:4px;flex-wrap:wrap;}
.step-pill{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);background:var(--surface);color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.step-pill.active{background:var(--accent);border-color:var(--accent);color:white;}
.step-pill.done{background:var(--surface2);border-color:#64748b;color:var(--text);}
#info{font-size:12px;color:var(--text2);min-height:16px;padding:2px 0 3px}
#cw{position:relative;border-radius:10px;overflow:hidden;border:1px solid var(--border)}
canvas{display:block;width:100%;cursor:crosshair}
#ledit{display:none;position:absolute;background:var(--surface);border:1.5px solid #64748b;border-radius:var(--radius);padding:4px 8px;z-index:20}
#ledit input{border:none;outline:none;font-size:13px;font-weight:600;width:68px;background:transparent;color:var(--text);text-align:center;font-family:var(--font)}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(15,23,42,0.95);color:var(--text);padding:7px 16px;border-radius:20px;font-size:12px;pointer-events:none;opacity:0;transition:opacity 0.3s;white-space:nowrap;z-index:100;border:1px solid var(--border)}
#modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.65);align-items:center;justify-content:center;z-index:50;padding:16px}
#mbox{background:var(--surface);border-radius:12px;padding:22px;width:100%;max-width:420px;border:1px solid var(--border)}
#mbox h3{font-size:15px;font-weight:600;margin-bottom:14px}
#mbox input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:9px 12px;font-size:14px;color:var(--text);font-family:var(--font);outline:none;margin-bottom:10px}
#mbox input:focus{border-color:#64748b}
#mact{display:flex;gap:8px;justify-content:flex-end;margin-top:8px}
#mcontent{max-height:400px;overflow-y:auto}
.si{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;margin-bottom:6px;gap:8px}
.sn{font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sm{font-size:11px;color:var(--text2);white-space:nowrap}
.sb{display:flex;gap:5px;flex-shrink:0}
.sb button{font-size:11px;padding:3px 8px}
.mload{color:var(--text2);font-size:13px;padding:8px 0}
.obj-item{border:1px solid var(--border);border-radius:4px;background:var(--surface2);cursor:grab;flex-shrink:0;display:inline-block;vertical-align:middle;width:36px;height:36px}
.obj-item:hover{border-color:#64748b;background:var(--surface)}
.obj-item:active{cursor:grabbing}
</style>
</head>
<body>
<div id="header">
  <div class="logo">IB</div>
  <h1>Innebandytaktik <span>— Tränarverktyg</span></h1>
  <div id="db-status"><div class="dbdot" id="dbdot"></div><span id="dblbl">Ansluter...</span></div>
</div>
<div id="main">
  <div class="row">
    <span class="rl">Spelform</span>
    <button onclick="setFormat('1v0')">1v0</button>
    <button onclick="setFormat('2v1')">2v1</button>
    <button onclick="setFormat('3v2')">3v2</button>
    <button onclick="setFormat('3v3')">3v3</button>
    <button class="active" onclick="setFormat('4v4')">4v4</button>
    <button onclick="setFormat('5v5')">5v5</button>
    <button onclick="setFormat('5v4')">5v4</button>
    <button onclick="setFormat('4v5')">4v5</button>
    <button onclick="setFormat('6v5')">6v5</button>
    <button onclick="setFormat('5v6')">5v6</button>
  </div>
  <div class="row">
    <span class="rl">Verktyg</span>
    <button class="active" id="btn-select" onclick="setTool('select')">✥ Flytta</button>
    <button id="btn-arrow" onclick="setTool('arrow')">Passning</button>
    <button id="btn-run" onclick="setTool('run')">Rörelse</button>
    <button id="btn-ball" onclick="setTool('ball')">● Boll</button>
    <div class="sep"></div>
    <button id="btn-addstep" onclick="addStep()">+ Steg</button>
    <button id="btn-playstep" onclick="playCurrentStep()" disabled>▶ Spela</button>
    <button id="btn-clearstep" onclick="clearCurrentArrows()">Rensa steg</button>
    <div class="sep"></div>
    <button onclick="resetAll()">Återställ</button>
  </div>
  <div class="row">
    <span class="rl">Zon</span>
    <button id="btn-rect" onclick="setZoneTool('rect')">Rektangel</button>
    <button id="btn-ellipse" onclick="setZoneTool('ellipse')">Ellips</button>
    <button id="btn-poly" onclick="setZoneTool('poly')">Polygon</button>
    <div class="csep"></div>
    <div class="cdot active" id="cd-0" style="background:#3b82f6" onclick="setZC(0)"></div>
    <div class="cdot" id="cd-1" style="background:#ef4444" onclick="setZC(1)"></div>
    <div class="cdot" id="cd-2" style="background:#22c55e" onclick="setZC(2)"></div>
    <div class="cdot" id="cd-3" style="background:#eab308" onclick="setZC(3)"></div>
    <div class="cdot" id="cd-4" style="background:#f97316" onclick="setZC(4)"></div>
    <div class="cdot" id="cd-5" style="background:#a855f7" onclick="setZC(5)"></div>
    <div class="csep"></div>
    <button onclick="undoZone()">Ångra</button>
    <button onclick="clearZones()">Rensa zoner</button>
    <div class="sep"></div>
    <button class="primary" onclick="openSave()">💾 Spara</button>
    <button onclick="openLoad()">📂 Ladda</button>
    <button onclick="exportImg()">⬇ PNG</button>
  </div>
  <div class="row" id="obj-panel">
    <span class="rl">Objekt</span>
    <canvas class="obj-item" id="obj-mal-stor" width="36" height="36" title="Stort mål (5v5)" draggable="true" data-type="mal-stor"></canvas>
    <canvas class="obj-item" id="obj-mal-mellan" width="36" height="36" title="Mellanstor mål" draggable="true" data-type="mal-mellan"></canvas>
    <canvas class="obj-item" id="obj-mal-litet" width="36" height="36" title="Litet mål (3v3)" draggable="true" data-type="mal-litet"></canvas>
    <canvas class="obj-item" id="obj-mal-mini" width="36" height="36" title="Minimål" draggable="true" data-type="mal-mini"></canvas>
    <div class="sep"></div>
    <canvas class="obj-item" id="obj-kon-liten" width="24" height="24" title="Liten kon" draggable="true" data-type="kon-liten" style="width:24px;height:24px"></canvas>
    <canvas class="obj-item" id="obj-kon-stor" width="28" height="28" title="Stor kon" draggable="true" data-type="kon-stor" style="width:28px;height:28px"></canvas>
    <canvas class="obj-item" id="obj-hinder" width="36" height="36" title="Hinder/block" draggable="true" data-type="hinder"></canvas>
    <canvas class="obj-item" id="obj-stege" width="36" height="36" title="Stege" draggable="true" data-type="stege"></canvas>
    <canvas class="obj-item" id="obj-sarg" width="36" height="36" title="Passningsvägg (sarg)" draggable="true" data-type="sarg"></canvas>
    <div class="sep"></div>
    <canvas class="obj-item" id="obj-spelare-rod" width="36" height="36" title="Röd spelare (lag A)" draggable="true" data-type="spelare-rod"></canvas>
    <canvas class="obj-item" id="obj-spelare-bla" width="36" height="36" title="Blå spelare (lag B)" draggable="true" data-type="spelare-bla"></canvas>
    <div class="sep"></div>
    <button onclick="clearObjekter()" style="font-size:11px">Rensa objekt</button>
    <button onclick="taBortValdSpelare()" id="btn-tabort-spelare" style="font-size:11px">✕ Ta bort spelare</button>
  </div>

  <div id="stepbar">
    <span style="color:var(--text2);font-size:11px;white-space:nowrap">STEG</span>
    <div class="step-pills" id="step-pills"></div>
    <button style="margin-left:auto;font-size:11px" onclick="removeStep()">✕ Ta bort</button>
  </div>

  <div id="info">Rita pilar för passningar och rörelser. Lägg till steg för att visa spelsekvenser. Dubbelklicka spelare för att byta namn.</div>
  <div style="display:flex;align-items:center;gap:16px;padding:4px 2px;font-size:11px;color:var(--text2)">
    <span style="display:flex;align-items:center;gap:6px">
      <svg width="32" height="10" style="flex-shrink:0"><line x1="0" y1="5" x2="32" y2="5" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
      Rörelse/löpning
    </span>
    <span style="display:flex;align-items:center;gap:6px">
      <svg width="32" height="10" style="flex-shrink:0"><line x1="0" y1="5" x2="32" y2="5" stroke="white" stroke-width="2" stroke-dasharray="6 4" stroke-linecap="round"/></svg>
      Passning
    </span>
  </div>

  <div id="cw">
    <canvas id="c"></canvas>
    <div id="ledit"><input id="linput" maxlength="5" spellcheck="false" autocomplete="off"/></div>
  </div>
</div>

<div id="toast"></div>
<div id="modal"><div id="mbox"><h3 id="mtitle"></h3><div id="mcontent"></div><div id="mact"></div></div></div>

<script>
const API='/.netlify/functions/ovningar';
const COACHCORE_API='https://coachcore.netlify.app/.netlify/functions/ai-motor';

const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const W=800,H=480;cv.width=W;cv.height=H;
const PX=40,PY=40,PW=720,PH=400;
const ML=103,MR=697,OZW=90,OZH=80,OZY=200,IZW=18,IZH=50,IZY=215,MCR=50;
const ZC=['#3b82f6','#ef4444','#22c55e','#eab308','#f97316','#a855f7'];
const CO={bd:'#0d2244',fi:'#add8e6',oz:'#1a3a6b',iz:'#add8e6',A:'#E3000F',B:'#1a3a6b',Bs:'#5a8abf',ba:'#f5c518',pa:'#ff3333',ru:'#ffffff'};

let tool='select',zt=null,zci=0;
let drag=null,as=null,zones=[],players=[],ball={x:W/2,y:H/2};
let zdraw=false,zst=null,pp=[];
let ep=null,lcp=null,lct=0,mdp=null,dd=false,mdt=0;
let fmt='4v4';

// STEG-SYSTEM
// Varje steg har: { players, ball, arrows, zones }
// currentStep = index i steps[]
let steps=[{arrows:[],players:null,ball:null,zones:[]}];
let currentStep=0;
let animFrame=null,animAt=0,animPlaying=false;

function getStep(){return steps[currentStep];}

function saveCurrentState(){
  // Spara nuvarande spelares positioner + boll i aktuellt steg
  steps[currentStep].players=JSON.parse(JSON.stringify(players));
  steps[currentStep].ball={...ball};
  steps[currentStep].zones=JSON.parse(JSON.stringify(zones));
}

function loadStep(idx){
  saveCurrentState();
  currentStep=idx;
  const s=steps[currentStep];
  // Ladda spelarpositioner om de finns sparade för detta steg
  if(s.players)players=JSON.parse(JSON.stringify(s.players));
  if(s.ball)ball={...s.ball};
  if(s.zones)zones=JSON.parse(JSON.stringify(s.zones));
  updStepBar();
  draw();
  si(`Steg ${currentStep+1} av ${steps.length} — rita pilar och flytta spelare fritt.`);
}

function addStep(){
  saveCurrentState();
  // Nytt steg ärver spelarpositioner från nuvarande steg
  const newStep={
    arrows:[],
    players:JSON.parse(JSON.stringify(players)),
    ball:{...ball},
    zones:JSON.parse(JSON.stringify(zones))
  };
  steps.splice(currentStep+1,0,newStep);
  loadStep(currentStep+1);
  toast(`Steg ${currentStep+1} lagt till`);
}

function removeStep(){
  if(steps.length<=1){toast('Minst ett steg krävs');return;}
  steps.splice(currentStep,1);
  currentStep=Math.min(currentStep,steps.length-1);
  const s=steps[currentStep];
  if(s.players)players=JSON.parse(JSON.stringify(s.players));
  if(s.ball)ball={...s.ball};
  if(s.zones)zones=JSON.parse(JSON.stringify(s.zones));
  updStepBar();draw();
}

function clearCurrentArrows(){
  steps[currentStep].arrows=[];draw();si('Pilar rensade för detta steg.');}

function updStepBar(){
  const bar=document.getElementById('stepbar');
  bar.style.display=steps.length>1||true?'flex':'none';
  const pills=document.getElementById('step-pills');
  pills.innerHTML=steps.map((s,i)=>`<div class="step-pill${i===currentStep?' active':i<currentStep?' done':''}" onclick="loadStep(${i})">${i+1}</div>`).join('');
  document.getElementById('btn-playstep').disabled=getStep().arrows.length===0;
}

// Animation för ett steg
function playCurrentStep(){
  if(animPlaying)return;
  const arrows=getStep().arrows;
  if(!arrows.length)return;
  animPlaying=true;animAt=0;
  document.getElementById('btn-playstep').disabled=true;
  (function tick(){
    animAt++;draw();
    if(animAt<60)animFrame=requestAnimationFrame(tick);
    else{animAt=60;draw();animPlaying=false;document.getElementById('btn-playstep').disabled=false;}
  })();
}

const FMT={
  '1v0':{A:[{x:.38,y:.5}],B:[]},
  '2v1':{A:[{x:.28,y:.35},{x:.28,y:.65}],B:[{x:.65,y:.5}]},
  '3v2':{A:[{x:.22,y:.25},{x:.22,y:.5},{x:.22,y:.75}],B:[{x:.65,y:.35},{x:.65,y:.65}]},
  '3v3':{A:[{x:.2,y:.25},{x:.2,y:.5},{x:.2,y:.75}],B:[{x:.8,y:.25},{x:.8,y:.5},{x:.8,y:.75}]},
  '4v4':{A:[{x:.18,y:.22},{x:.18,y:.5},{x:.18,y:.78},{x:.33,y:.5}],B:[{x:.82,y:.22},{x:.82,y:.5},{x:.82,y:.78},{x:.67,y:.5}]},
  '5v5':{A:[{x:.18,y:.18},{x:.18,y:.4},{x:.18,y:.62},{x:.18,y:.84},{x:.33,y:.5}],B:[{x:.82,y:.18},{x:.82,y:.4},{x:.82,y:.62},{x:.82,y:.84},{x:.67,y:.5}]},
  '5v4':{A:[{x:.18,y:.18},{x:.18,y:.4},{x:.18,y:.62},{x:.18,y:.84},{x:.33,y:.5}],B:[{x:.82,y:.22},{x:.82,y:.5},{x:.82,y:.78},{x:.67,y:.5}]},
  '4v5':{A:[{x:.18,y:.22},{x:.18,y:.5},{x:.18,y:.78},{x:.33,y:.5}],B:[{x:.82,y:.18},{x:.82,y:.4},{x:.82,y:.62},{x:.82,y:.84},{x:.67,y:.5}]},
  '6v5':{A:[{x:.15,y:.18},{x:.15,y:.4},{x:.15,y:.62},{x:.15,y:.84},{x:.3,y:.5},{x:.45,y:.5}],B:[{x:.82,y:.18},{x:.82,y:.4},{x:.82,y:.62},{x:.82,y:.84},{x:.67,y:.5}]},
  '5v6':{A:[{x:.18,y:.18},{x:.18,y:.4},{x:.18,y:.62},{x:.18,y:.84},{x:.33,y:.5}],B:[{x:.85,y:.18},{x:.85,y:.4},{x:.85,y:.62},{x:.85,y:.84},{x:.7,y:.5},{x:.55,y:.5}]},
};
function mkP(f){
  const d=FMT[f],a=[];
  d.A.forEach((p,i)=>a.push({team:'A',x:PX+p.x*PW,y:PY+p.y*PH,label:'A'+(i+1)}));
  d.B.forEach((p,i)=>a.push({team:'B',x:PX+p.x*PW,y:PY+p.y*PH,label:'B'+(i+1)}));
  return a;
}

(async()=>{
  const dot=document.getElementById('dbdot'),lbl=document.getElementById('dblbl');
  try{const r=await fetch(API);if(r.ok){dot.className='dbdot ok';lbl.textContent='Ansluten';}else throw 0;}
  catch{dot.className='dbdot err';lbl.textContent='Offline';}
})();

function h2r(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}
function si(m){document.getElementById('info').textContent=m;}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.style.opacity=1;setTimeout(()=>t.style.opacity=0,2500);}
function gxy(e){const r=cv.getBoundingClientRect(),s=W/r.width,src=e.touches?e.touches[0]:e;return{x:(src.clientX-r.left)*s,y:(src.clientY-r.top)*s};}
function gp(x,y){return players.find(p=>Math.hypot(p.x-x,p.y-y)<18);}

function drawField(){
  ctx.fillStyle=CO.bd;ctx.fillRect(0,0,W,H);
  ctx.fillStyle=CO.fi;ctx.fillRect(PX,PY,PW,PH);
  ctx.fillStyle=CO.oz;ctx.fillRect(ML,OZY,OZW,OZH);ctx.fillRect(MR-OZW,OZY,OZW,OZH);
  ctx.fillStyle=CO.iz;ctx.fillRect(ML,IZY,IZW,IZH);ctx.fillRect(MR-IZW,IZY,IZW,IZH);
  ctx.strokeStyle='white';ctx.setLineDash([]);ctx.lineWidth=2.5;
  ctx.strokeRect(PX,PY,PW,PH);
  ctx.beginPath();ctx.moveTo(W/2,PY);ctx.lineTo(W/2,PY+PH);ctx.stroke();
  ctx.beginPath();ctx.arc(W/2,H/2,MCR,0,Math.PI*2);ctx.stroke();
  ctx.lineWidth=2;
  ctx.strokeRect(ML,OZY,OZW,OZH);ctx.strokeRect(ML,IZY,IZW,IZH);
  ctx.strokeRect(MR-OZW,OZY,OZW,OZH);ctx.strokeRect(MR-IZW,IZY,IZW,IZH);
  ctx.strokeStyle='#E3000F';ctx.lineWidth=4;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(ML-11,IZY);ctx.lineTo(ML,IZY);ctx.stroke();
  ctx.beginPath();ctx.moveTo(ML-11,IZY+IZH);ctx.lineTo(ML,IZY+IZH);ctx.stroke();
  ctx.beginPath();ctx.moveTo(ML-11,IZY);ctx.lineTo(ML-11,IZY+IZH);ctx.stroke();
  ctx.beginPath();ctx.moveTo(MR,IZY);ctx.lineTo(MR+11,IZY);ctx.stroke();
  ctx.beginPath();ctx.moveTo(MR,IZY+IZH);ctx.lineTo(MR+11,IZY+IZH);ctx.stroke();
  ctx.beginPath();ctx.moveTo(MR+11,IZY);ctx.lineTo(MR+11,IZY+IZH);ctx.stroke();
  ctx.fillStyle='white';ctx.lineCap='butt';
  [[W/2,H/2],[W/2,PY+30],[W/2,PY+PH-30],[ML,PY+30],[ML,PY+PH-30],[MR,PY+30],[MR,PY+PH-30]].forEach(([x,y])=>{ctx.beginPath();ctx.arc(x,y,5,0,Math.PI*2);ctx.fill();});
}

function drawZone(z,prev){
  const col=ZC[z.ci]||ZC[0];
  ctx.save();ctx.fillStyle=h2r(col,prev?.3:.38);ctx.strokeStyle=h2r(col,.9);ctx.lineWidth=2;
  if(prev)ctx.setLineDash([6,4]);else ctx.setLineDash([]);
  if(z.type==='rect'){const x=Math.min(z.x1,z.x2),y=Math.min(z.y1,z.y2),w=Math.abs(z.x2-z.x1),h=Math.abs(z.y2-z.y1);ctx.beginPath();ctx.roundRect(x,y,w,h,5);ctx.fill();ctx.stroke();}
  else if(z.type==='ellipse'){const cx=(z.x1+z.x2)/2,cy=(z.y1+z.y2)/2,rx=Math.abs(z.x2-z.x1)/2,ry=Math.abs(z.y2-z.y1)/2;if(rx>2&&ry>2){ctx.beginPath();ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);ctx.fill();ctx.stroke();}}
  else if(z.type==='poly'&&z.pts.length>1){ctx.beginPath();ctx.moveTo(z.pts[0].x,z.pts[0].y);z.pts.forEach(p=>ctx.lineTo(p.x,p.y));ctx.closePath();ctx.fill();ctx.stroke();}
  ctx.restore();
}

function drawArrow(x1,y1,x2,y2,col,dashed,prog){
  const p=prog===undefined?1:prog;
  const ex=x1+(x2-x1)*p,ey=y1+(y2-y1)*p;
  if(Math.hypot(ex-x1,ey-y1)<4)return;
  ctx.save();ctx.strokeStyle=col;ctx.lineWidth=3;
  if(dashed)ctx.setLineDash([8,5]);else ctx.setLineDash([]);
  ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(ex,ey);ctx.stroke();
  ctx.setLineDash([]);
  const a=Math.atan2(ey-y1,ex-x1),al=13;
  ctx.fillStyle=col;ctx.beginPath();
  ctx.moveTo(ex,ey);
  ctx.lineTo(ex-al*Math.cos(a-0.4),ey-al*Math.sin(a-0.4));
  ctx.lineTo(ex-al*Math.cos(a+0.4),ey-al*Math.sin(a+0.4));
  ctx.closePath();ctx.fill();ctx.restore();
}

function drawBadge(x,y,n){
  ctx.save();ctx.fillStyle='rgba(0,0,0,0.7)';ctx.beginPath();ctx.arc(x,y,10,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='white';ctx.font='bold 9px DM Sans,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(n,x,y);ctx.restore();
}

function drawPlayer(p){
  ctx.fillStyle=p.team==='B'?CO.B:CO.A;
  ctx.beginPath();ctx.arc(p.x,p.y,16,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=p.team==='B'?CO.Bs:'rgba(255,255,255,0.9)';ctx.lineWidth=2.5;ctx.stroke();
  const l=p.label||'',fs=l.length<=2?11:l.length===3?9:7;
  ctx.fillStyle='#fff';ctx.font=`bold ${fs}px DM Sans,sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(l,p.x,p.y);
}

function draw(mx,my){
  ctx.clearRect(0,0,W,H);
  drawField();
  zones.forEach(z=>drawZone(z,false));
  if(zdraw&&zt&&zst&&mx!==undefined){
    if(zt==='rect'||zt==='ellipse')drawZone({type:zt,ci:zci,x1:zst.x,y1:zst.y,x2:mx,y2:my},true);
    else if(zt==='poly'&&pp.length>0)drawZone({type:'poly',ci:zci,pts:[...pp,{x:mx,y:my}]},true);
  }
  const arrows=getStep().arrows;
  arrows.forEach((a,i)=>{
    const prog=animPlaying&&i===arrows.length-1?Math.min(animAt/60,1):animPlaying&&i<arrows.length-1?1:animPlaying?0:1;
    if(!animPlaying||i<=arrows.length-1){
      drawArrow(a.x1,a.y1,a.x2,a.y2,'white',a.type==='arrow',animPlaying?(i<arrows.length-1?1:(animAt/60)):1);
      if(!animPlaying)drawBadge(a.x1,a.y1,i+1);
    }
  });
  players.forEach(p=>drawPlayer(p));
  ctx.fillStyle=CO.ba;ctx.beginPath();ctx.arc(ball.x,ball.y,8,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.4)';ctx.lineWidth=1.5;ctx.stroke();
  if(as){ctx.save();ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=1.5;ctx.setLineDash([5,4]);ctx.beginPath();ctx.arc(as.x,as.y,22,0,Math.PI*2);ctx.stroke();ctx.restore();}
  // Rita koner (från CoachCore)
  koner.forEach(k=>drawKon(k.x,k.y,k.label));
  // Rita objekt
  objekter.forEach((o,i)=>drawObjekt(o,i));
}

// Mouse events
cv.addEventListener('mousedown',e=>{
  if(ledit.style.display==='block'){closeLabel(true);return;}
  const{x,y}=gxy(e);mdt=Date.now();dd=false;mdp=null;
  if(zt==='rect'||zt==='ellipse'){zdraw=true;zst={x,y};return;}
  if(zt==='poly'){pp.push({x,y});si(`${pp.length} punkt${pp.length>1?'er':''} — dubbelklicka för att avsluta.`);draw(x,y);return;}
  if(tool==='ball'){ball.x=x;ball.y=y;draw();return;}
  if(tool==='select'){
    // Kolla om vi klickar på rotationshandtag
    if(selectedObjIdx!==null){
      const so=objekter[selectedObjIdx];
      const sz=OBJ_SIZES[so.type]||{w:30,h:20};
      const hx=so.x,hy=so.y-Math.max(sz.w/2,sz.h/2)-16;
      if(Math.hypot(x-hx,y-hy)<10){
        objekter[selectedObjIdx].rot=((objekter[selectedObjIdx].rot||0)+45)%360;
        draw();return;
      }
    }
    // Kolla om vi klickar på ett objekt
    const oi=getObjAt(x,y);
    if(oi>=0){
      selectedObjIdx=oi;
      drag={objIdx:oi,ox:x-objekter[oi].x,oy:y-objekter[oi].y};
      draw();return;
    }
    selectedObjIdx=null;
    const p=gp(x,y);if(p){drag={obj:p,ox:x-p.x,oy:y-p.y};mdp=p;return;}
    if(Math.hypot(ball.x-x,ball.y-y)<12){drag={ball:true,ox:x-ball.x,oy:y-ball.y};return;}
  }
  if(tool==='tabort'){
    const p=gp(x,y);
    if(p){const i=players.indexOf(p);if(i>=0){players.splice(i,1);draw();si('Spelare borttagen.');return;}}
    return;
  }
  if(tool==='arrow'||tool==='run'){
    const p=gp(x,y);
    if(!as){if(p){as={x:p.x,y:p.y};si('Startpunkt vald — klicka på mål eller punkt.');draw();}}
    else{
      const p2=gp(x,y);
      getStep().arrows.push({type:tool,x1:as.x,y1:as.y,x2:p2?p2.x:x,y2:p2?p2.y:y});
      as=null;updStepBar();draw();
    }
  }
});

cv.addEventListener('mousemove',e=>{
  const{x,y}=gxy(e);
  if(drag){dd=true;
    if(drag.ball){ball.x=x-drag.ox;ball.y=y-drag.oy;}
    else if(drag.objIdx!==undefined){objekter[drag.objIdx].x=x-drag.ox;objekter[drag.objIdx].y=y-drag.oy;}
    else if(drag.obj){drag.obj.x=x-drag.ox;drag.obj.y=y-drag.oy;}
    draw(x,y);
  }
  else if(zdraw||(zt==='poly'&&pp.length)||(as&&(tool==='arrow'||tool==='run'))){draw(x,y);}
});

cv.addEventListener('mouseup',e=>{
  const{x,y}=gxy(e);
  if(zdraw&&(zt==='rect'||zt==='ellipse')){
    if(Math.abs(x-zst.x)>8&&Math.abs(y-zst.y)>8)zones.push({type:zt,ci:zci,x1:zst.x,y1:zst.y,x2:x,y2:y});
    zdraw=false;zst=null;draw();return;
  }
  if(!dd&&tool==='select'&&mdp&&Date.now()-mdt<300){
    if(lcp===mdp&&Date.now()-lct<500){openLabel(mdp);lcp=null;}
    else{lcp=mdp;lct=Date.now();}
  }
  drag=null;mdp=null;
});

cv.addEventListener('dblclick',e=>{
  if(zt==='poly'&&pp.length>=3){zones.push({type:'poly',ci:zci,pts:[...pp]});pp=[];zdraw=false;si('Polygon sparad.');draw();return;}
  if(tool==='select'){
    const{x,y}=gxy(e);

// ===== OBJEKTSYSTEM =====
let objekter=[]; // {type, x, y}
let dragObjType=null; // typ som dras från panelen
let dragObjIdx=null; // index på objekt som dras på canvas
let selectedObjIdx=null; // valt objekt för rotation

const OBJ_SIZES={
  'mal-stor':{w:60,h:20},
  'mal-mellan':{w:44,h:16},
  'mal-litet':{w:30,h:14},
  'mal-mini':{w:20,h:10},
  'kon-liten':{w:10,h:14},
  'kon-stor':{w:14,h:18},
  'hinder':{w:40,h:16},
  'stege':{w:24,h:40},
  'sarg':{w:60,h:12},
  'spelare-rod':{w:32,h:32},
  'spelare-bla':{w:32,h:32},
};

function drawObjekt(obj,idx){
  const{type,x,y}=obj;
  const rot=obj.rot||0;
  const sz=OBJ_SIZES[type]||{w:30,h:20};
  const hw=sz.w/2,hh=sz.h/2;
  const r=Math.max(hw,hh);

  // Markering och handtag UTAN rotation (i world-space)
  if(idx===selectedObjIdx){
    ctx.save();
    ctx.strokeStyle='#facc15';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
    ctx.beginPath();ctx.arc(x,y,r+8,0,Math.PI*2);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='#facc15';
    ctx.beginPath();ctx.arc(x,y-r-16,6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#0f172a';ctx.font='bold 9px sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('↻',x,y-r-16);
    ctx.restore();
  }

  // Allt nedan ritas i roterat koordinatsystem kring (x,y)
  ctx.save();
  ctx.translate(x,y);
  ctx.rotate(rot*Math.PI/180);

  if(type==='spelare-rod'||type==='spelare-bla'){
    const team=type==='spelare-rod'?'A':'B';
    ctx.fillStyle=team==='A'?CO.A:CO.B;
    ctx.beginPath();ctx.arc(0,0,16,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=team==='A'?'rgba(255,255,255,0.9)':CO.Bs;ctx.lineWidth=2.5;ctx.stroke();
    ctx.restore();return;
  }

  if(type.startsWith('mal')){
    ctx.strokeStyle='white';ctx.lineWidth=3;ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(-hw,-hh);ctx.lineTo(-hw,hh);
    ctx.moveTo(hw,-hh);ctx.lineTo(hw,hh);
    ctx.moveTo(-hw,-hh);ctx.lineTo(hw,-hh);
    ctx.stroke();
    ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1;ctx.setLineDash([3,3]);
    ctx.beginPath();ctx.moveTo(-hw,hh);ctx.lineTo(hw,hh);ctx.stroke();
    ctx.setLineDash([]);
  }else if(type==='kon-liten'||type==='kon-stor'){
    ctx.fillStyle='#f97316';
    ctx.beginPath();ctx.moveTo(0,-hh);ctx.lineTo(-hw,hh);ctx.lineTo(hw,hh);
    ctx.closePath();ctx.fill();
    ctx.strokeStyle='#ea580c';ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle='rgba(0,0,0,0.3)';
    ctx.beginPath();ctx.arc(0,-hh+3,2,0,Math.PI*2);ctx.fill();
  }else if(type==='hinder'){
    ctx.fillStyle='#475569';
    ctx.beginPath();ctx.roundRect(-hw,-hh,sz.w,sz.h,3);ctx.fill();
    ctx.strokeStyle='#64748b';ctx.lineWidth=1.5;ctx.stroke();
    ctx.strokeStyle='#334155';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(-hw,-hh);ctx.lineTo(hw,hh);ctx.stroke();
    ctx.beginPath();ctx.moveTo(hw,-hh);ctx.lineTo(-hw,hh);ctx.stroke();
  }else if(type==='stege'){
    ctx.strokeStyle='#94a3b8';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(-6,-hh);ctx.lineTo(-6,hh);ctx.stroke();
    ctx.beginPath();ctx.moveTo(6,-hh);ctx.lineTo(6,hh);ctx.stroke();
    for(let i=0;i<=4;i++){
      const py=-hh+(sz.h/4)*i;
      ctx.beginPath();ctx.moveTo(-6,py);ctx.lineTo(6,py);ctx.stroke();
    }
  }else if(type==='sarg'){
    ctx.fillStyle='#1e3a5f';
    ctx.beginPath();ctx.roundRect(-hw,-hh,sz.w,sz.h,2);ctx.fill();
    ctx.strokeStyle='#3b82f6';ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle='#93c5fd';ctx.font='bold 7px sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('SARG',0,0);
  }
  ctx.restore();
}

function clearObjekter(){objekter=[];selectedObjIdx=null;draw();si('Objekt rensade.');}

function taBortValdSpelare(){
  if(selectedObjIdx!==null){
    objekter.splice(selectedObjIdx,1);
    selectedObjIdx=null;draw();si('Objekt borttaget.');return;
  }
  // Aktivera ta-bort-läge för spelare
  if(tool==='tabort'){setTool('select');si('Ta bort-läge avaktiverat.');}
  else{setTool('tabort');si('Klicka på en spelare för att ta bort den.');}
}

function getObjAt(x,y){
  for(let i=objekter.length-1;i>=0;i--){
    const o=objekter[i];
    const sz=OBJ_SIZES[o.type]||{w:30,h:20};
    if(Math.abs(x-o.x)<sz.w/2+4&&Math.abs(y-o.y)<sz.h/2+4)return i;
  }
  return -1;
}

// Rita objektikoner i panelen
function ritaObjIkoner(){
  const typer=['mal-stor','mal-mellan','mal-litet','mal-mini','kon-liten','kon-stor','hinder','stege','sarg','spelare-rod','spelare-bla'];
  typer.forEach(type=>{
    const c=document.getElementById('obj-'+type);
    if(!c)return;
    const ctx2=c.getContext('2d');
    ctx2.clearRect(0,0,c.width,c.height);
    // Rita miniversion av objektet
    const tmpCtx=ctx;
    // Använd samma drawObjekt men på mini-canvas
    const mx=c.width/2,my=c.height/2;
    ctx2.save();
    const sz=OBJ_SIZES[type]||{w:30,h:20};
    const scaleX=Math.min((c.width-4)/sz.w,1);
    const scaleY=Math.min((c.height-4)/sz.h,1);
    const scale=Math.min(scaleX,scaleY);
    ctx2.translate(mx,my);ctx2.scale(scale,scale);
    const hw=sz.w/2,hh=sz.h/2;
    if(type.startsWith('mal')){
      ctx2.strokeStyle='white';ctx2.lineWidth=3/scale;ctx2.lineCap='round';
      ctx2.beginPath();
      ctx2.moveTo(-hw,-hh);ctx2.lineTo(-hw,hh);
      ctx2.moveTo(hw,-hh);ctx2.lineTo(hw,hh);
      ctx2.moveTo(-hw,-hh);ctx2.lineTo(hw,-hh);
      ctx2.stroke();
    }else if(type.startsWith('kon')){
      ctx2.fillStyle='#f97316';
      ctx2.beginPath();ctx2.moveTo(0,-hh);ctx2.lineTo(-hw,hh);ctx2.lineTo(hw,hh);
      ctx2.closePath();ctx2.fill();
      ctx2.strokeStyle='#ea580c';ctx2.lineWidth=1/scale;ctx2.stroke();
    }else if(type==='hinder'){
      ctx2.fillStyle='#475569';
      ctx2.fillRect(-hw,-hh,sz.w,sz.h);
      ctx2.strokeStyle='#64748b';ctx2.lineWidth=1.5/scale;ctx2.strokeRect(-hw,-hh,sz.w,sz.h);
    }else if(type==='stege'){
      ctx2.strokeStyle='#94a3b8';ctx2.lineWidth=2/scale;
      ctx2.beginPath();ctx2.moveTo(-6,-hh);ctx2.lineTo(-6,hh);ctx2.stroke();
      ctx2.beginPath();ctx2.moveTo(6,-hh);ctx2.lineTo(6,hh);ctx2.stroke();
      for(let i=0;i<=4;i++){
        const py=-hh+(sz.h/4)*i;
        ctx2.beginPath();ctx2.moveTo(-6,py);ctx2.lineTo(6,py);ctx2.stroke();
      }
    }else if(type==='sarg'){
      ctx2.fillStyle='#1e3a5f';ctx2.fillRect(-hw,-hh,sz.w,sz.h);
      ctx2.strokeStyle='#3b82f6';ctx2.lineWidth=2/scale;ctx2.strokeRect(-hw,-hh,sz.w,sz.h);
      ctx2.fillStyle='#93c5fd';ctx2.font=`bold ${7/scale}px sans-serif`;
      ctx2.textAlign='center';ctx2.textBaseline='middle';ctx2.fillText('SARG',0,0);
    }else if(type==='spelare-rod'){
      ctx2.fillStyle=CO.A;
      ctx2.beginPath();ctx2.arc(0,0,12,0,Math.PI*2);ctx2.fill();
      ctx2.strokeStyle='rgba(255,255,255,0.9)';ctx2.lineWidth=2/scale;ctx2.stroke();
      ctx2.fillStyle='white';ctx2.font=`bold ${8/scale}px sans-serif`;
      ctx2.textAlign='center';ctx2.textBaseline='middle';ctx2.fillText('A',0,0);
    }else if(type==='spelare-bla'){
      ctx2.fillStyle=CO.B;
      ctx2.beginPath();ctx2.arc(0,0,12,0,Math.PI*2);ctx2.fill();
      ctx2.strokeStyle=CO.Bs;ctx2.lineWidth=2/scale;ctx2.stroke();
      ctx2.fillStyle='white';ctx2.font=`bold ${8/scale}px sans-serif`;
      ctx2.textAlign='center';ctx2.textBaseline='middle';ctx2.fillText('B',0,0);
    }
    ctx2.restore();
  });
}

    players.push({team:'A',x,y,label:'A'+(players.filter(p=>p.team==='A').length+1)});
  }else if(dragObjType==='spelare-bla'){
    players.push({team:'B',x,y,label:'B'+(players.filter(p=>p.team==='B').length+1)});
  }else{
    objekter.push({type:dragObjType,x,y,rot:0});
  }
  draw();
  dragObjType=null;
});

// Save/Load
async function openSave(){
  document.getElementById('mtitle').textContent='Spara övning';
  document.getElementById('mcontent').innerHTML=`<input id="sname" placeholder="Namn på övningen..." autocomplete="off"/>`;
  document.getElementById('mact').innerHTML=`<button onclick="closeModal()">Avbryt</button><button class="primary" onclick="doSave()">Spara</button>`;
  document.getElementById('modal').style.display='flex';
  setTimeout(()=>document.getElementById('sname').focus(),60);
}
async function doSave(){
  const name=(document.getElementById('sname').value||'').trim();if(!name)return;
  try{
    const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,format:fmt,...snap()})});
    if(!r.ok)throw 0;closeModal();toast(`✓ Sparade "${name}"`);
  }catch{
    const ls=JSON.parse(localStorage.getItem('ib')||'[]');
    ls.unshift({id:'l'+Date.now(),name,ts:Date.now(),...snap()});
    localStorage.setItem('ib',JSON.stringify(ls.slice(0,50)));
    closeModal();toast(`✓ Sparade "${name}" (lokalt)`);
  }
}
async function openLoad(){
  document.getElementById('mtitle').textContent='Ladda övning';
  document.getElementById('mcontent').innerHTML='<p class="mload">Hämtar...</p>';
  document.getElementById('mact').innerHTML=`<button onclick="closeModal()">Stäng</button>`;
  document.getElementById('modal').style.display='flex';
  let saves=[];
  try{const r=await fetch(API);if(r.ok)saves=await r.json();}catch{}
  const ls=JSON.parse(localStorage.getItem('ib')||'[]');
  const all=[...saves.map(s=>({...s.data,...s,isCloud:true})),...ls.map(s=>({...s,isLocal:true}))];
  all.sort((a,b)=>(b.ts||0)-(a.ts||0));
  if(!all.length){document.getElementById('mcontent').innerHTML='<p class="mload">Inga sparade övningar.</p>';return;}
  document.getElementById('mcontent').innerHTML=all.map(s=>`<div class="si"><span class="sn">${s.name||'—'}</span><span class="sm">${s.format||''} ${s.isCloud?'☁️':'💾'}</span><div class="sb"><button onclick='loadSnap(${JSON.stringify(s)})'>Ladda</button><button onclick='delSnap("${s.id||''}",${!!s.isLocal})'>✕</button></div></div>`).join('');
}
function loadSnap(s){
  if(typeof s==='string')s=JSON.parse(s);
  const d=s.data||s;
  fmt=d.format||'4v4';
  players=d.players||mkP(fmt);
  ball=d.ball||{x:W/2,y:H/2};
  zones=d.zones||[];
  steps=d.steps||[{arrows:d.arrows||[],players:JSON.parse(JSON.stringify(players)),ball:{...ball},zones:[]}];
  currentStep=0;
  updStepBar();closeModal();draw();toast(`✓ Laddade "${s.name||d.name}"`);
}
async function delSnap(id,isLocal){
  if(isLocal){const ls=JSON.parse(localStorage.getItem('ib')||'[]').filter(s=>s.id!==id);localStorage.setItem('ib',JSON.stringify(ls));}
  else if(id){try{await fetch(`${API}?id=${id}`,{method:'DELETE'});}catch{}}
  toast('Borttagen.');openLoad();
}
function closeModal(){document.getElementById('modal').style.display='none';}

// Ladda övning från CoachCore via URL-parameter (nytt rollbaserat format)
function laddaFranCoachCore(viz){
  if(!viz||!viz.steg||!viz.steg.length)return;

  // Hämta spelform och formation
  const spelform=viz.spelform||viz.format||'4v4';
  const formation=viz.formation||Object.keys(VIZ_POSITIONER[spelform]||{})[0]||'Boxen 2-2';
  const posMap=VIZ_POSITIONER[spelform]?.[formation]||{};

  // Sätt spelform i UI
  fmt=spelform;

  // Bygg spelare från positionskartan
  const spelareLista=Object.entries(posMap).map(([roll,pos])=>({
    team:pos.team,x:pos.x,y:pos.y,label:roll
  }));
  players=spelareLista;

  // Sätt boll hos rätt spelare (bollhos = rollnamn)
  const forstaSteg=viz.steg[0];
  const bollRoll=forstaSteg.bollhos||'VB';
  const bollPos=posMap[bollRoll]||posMap['VB']||{x:130,y:240};
  ball={x:bollPos.x,y:bollPos.y};

  // Koner från första steget
  koner=[];
  (forstaSteg.koner||[]).forEach(k=>{
    const platser=KON_PLATSER[k]||[];
    if(platser.length){
      const idx=koner.filter(ko=>platser.some(p=>p.x===ko.x&&p.y===ko.y)).length;
      if(platser[idx])koner.push({x:platser[idx].x,y:platser[idx].y,label:'K'});
    }
  });

  // Zoner
  const ZON_KOORDINATER={
    'backzon':{typ:'rect',ci:0,x1:103,y1:80,x2:280,y2:400},
    'slott':{typ:'rect',ci:1,x1:607,y1:200,x2:697,y2:280},
    'mittzon':{typ:'rect',ci:2,x1:300,y1:80,x2:500,y2:400},
  };
  zones=(forstaSteg.zoner||[]).map(z=>ZON_KOORDINATER[z]).filter(Boolean);

  // Bygg steg
  steps=viz.steg.map((steg)=>{
    // Uppdatera bollposition per steg
    const stepBollRoll=steg.bollhos||bollRoll;
    const stepBollPos=posMap[stepBollRoll]||bollPos;

    // Bygg pilar från roller till roller
    const pilarISteg=(steg.pilar||[]).map(p=>{
      const franPos=posMap[p.fran];
      if(!franPos)return null;
      let tillX,tillY;
      if(posMap[p.till]){
        tillX=posMap[p.till].x;tillY=posMap[p.till].y;
      }else if(RIKTNING_OFFSET[p.till]){
        tillX=franPos.x+RIKTNING_OFFSET[p.till].dx;
        tillY=franPos.y+RIKTNING_OFFSET[p.till].dy;
      }else{
        tillX=franPos.x+100;tillY=franPos.y;
      }
      return{type:p.typ==='run'?'run':'arrow',x1:franPos.x,y1:franPos.y,x2:tillX,y2:tillY};
    }).filter(Boolean);

    return{
      arrows:pilarISteg,
      players:JSON.parse(JSON.stringify(spelareLista)),
      ball:{x:stepBollPos.x,y:stepBollPos.y},
      zones:zones
    };
  });

  currentStep=0;
  updStepBar();
  draw();
  si(`📋 ${viz.namn||'Övning från CoachCore'} — ${viz.steg.length} steg · ${spelform} ${formation}`);
  toast(`✓ Laddade: ${viz.namn||'Övning från CoachCore'}`);
}

// Kolla URL-parameter vid start
(function(){
  const params=new URLSearchParams(window.location.search);
  const ovningParam=params.get('ovning');
  if(ovningParam){
    try{
      const json=JSON.parse(decodeURIComponent(escape(atob(ovningParam))));
      setTimeout(()=>laddaFranCoachCore(json),100);
    }catch(e){
      console.error('Kunde inte ladda övning från URL:',e);
    }
  }
})();
